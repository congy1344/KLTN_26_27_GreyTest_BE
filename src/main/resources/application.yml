spring:
  application:
    name: greytest
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/greytest}
    username: ${SPRING_DATASOURCE_USERNAME:greytest}
    password: ${SPRING_DATASOURCE_PASSWORD:greytest_password}
  jpa:
    hibernate:
      # ponytail: update đủ cho giai đoạn dev; chuyển sang Flyway khi schema ổn định
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# API key LLM lấy từ env, KHÔNG commit (xem .env.example)
llm:
  api-key: ${LLM_API_KEY:}
