spring:
  application:
    name: greytest
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/greytest}
    username: ${SPRING_DATASOURCE_USERNAME:greytest}
    password: ${SPRING_DATASOURCE_PASSWORD:greytest_password}
  jpa:
    hibernate:
      # Flyway quản lý schema; JPA chỉ validate entity khớp với DB
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# Thư mục lưu source code đã upload/clone
greytest:
  storage:
    path: ${GREYTEST_STORAGE_PATH:./storage}
  auth:
    token-secret: ${GREYTEST_AUTH_TOKEN_SECRET:dev-greytest-token-secret-change-me}

# API key LLM lấy từ env, KHÔNG commit (xem .env.example)
llm:
  api-key: ${LLM_API_KEY:}
